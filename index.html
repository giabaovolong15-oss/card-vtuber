<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cơ Sở Dữ Liệu Card Vtuber</title>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --card-bg: #1a1a2e;
            --text-color: #e2e2e2;
            --accent-color: #ff4757;
            --like-color: #2ed573;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            margin-bottom: 25px;
        }

        .search-container {
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #333;
            background-color: #222;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Thanh Header mới chia đôi 2 bên */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0;
        }

        .card-timestamp {
            font-size: 12px;
            color: #9e9ebb;
            font-style: italic;
        }

        .image-container {
            position: relative;
            width: 100%;
            padding-top: 140%; /* Tỉ lệ chuẩn cho card game */
            background-color: #000;
            overflow: hidden;
            cursor: zoom-in;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
        }

        .interaction-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0,0,0,0.1);
        }

        .btn {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.05);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .btn-heart.active {
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-like.active {
            color: var(--like-color);
            font-weight: bold;
        }

        /* Khu vực bình luận thông báo khóa */
        .comment-section {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.15);
            text-align: center;
            font-size: 13px;
            color: #ff4757;
            font-style: italic;
            font-weight: 500;
        }

        /* Overlay chế độ siêu thu phóng */
        .zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .zoom-overlay img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.1s ease;
            cursor: grab;
        }

        .zoom-overlay img:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <h1>Hệ Thống Tra Cứu Card Vtuber</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Nhập tên Vtuber cần tìm...">
    </div>

    <div class="grid-container" id="cardGrid"></div>

    <div class="zoom-overlay" id="zoomOverlay">
        <img id="zoomImage" src="" alt="Zoomed Card">
    </div>

    <script src="data.js"></script>

    <script>
        // Hàm hiển thị danh sách Card kèm cơ chế nạp Like/Tim từ LocalStorage
        function renderCards(list) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';

            list.forEach(vtuber => {
                // Đọc dữ liệu tương tác cá nhân đã lưu từ máy hoặc lấy mặc định nếu chưa bấm bao giờ
                const savedHeart = localStorage.getItem(`heart_${vtuber.id}`) === 'true';
                const savedLike = localStorage.getItem(`like_${vtuber.id}`) === 'true';

                // Giả lập số liệu gốc tăng thêm 1 nếu máy này đã bấm tương tác trước đó
                const currentHearts = vtuber.hearts + (savedHeart ? 1 : 0);
                const currentLikes = vtuber.likes + (savedLike ? 1 : 0);

                const cardHTML = `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">${vtuber.name}</span>
                            <span class="card-timestamp">Cập nhật: ${vtuber.lastUpdate}</span>
                        </div>
                        <div class="image-container" onclick="openZoom('${vtuber.image}')">
                            <img src="${vtuber.image}" alt="${vtuber.name}">
                        </div>
                        <div class="interaction-bar">
                            <button class="btn btn-heart ${savedHeart ? 'active' : ''}" 
                                    onclick="toggleInteract('${vtuber.id}', 'heart')" 
                                    ${savedHeart ? 'disabled' : ''}>
                                ❤️ <span id="count-heart-${vtuber.id}">${currentHearts}</span>
                            </button>
                            <button class="btn btn-like ${savedLike ? 'active' : ''}" 
                                    onclick="toggleInteract('${vtuber.id}', 'like')" 
                                    ${savedLike ? 'disabled' : ''}>
                                👍 <span id="count-like-${vtuber.id}">${currentLikes}</span>
                            </button>
                        </div>
                        <div class="comment-section">
                            🔒 Chức năng bình luận hiện đang khóa do chủ sở hữu
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // Hàm xử lý bấm Like/Thả tim và khóa nút, lưu vào máy
        function toggleInteract(id, type) {
            const key = `${type}_${id}`;
            
            // Nếu đã bấm rồi thì không cho bấm nữa (chống spam)
            if (localStorage.getItem(key) === 'true') return;

            // Đánh dấu đã bấm vào bộ nhớ máy
            localStorage.setItem(key, 'true');

            // Cập nhật tăng số hiển thị ngay lập tức trên màn hình
            const countSpan = document.getElementById(`count-${type}-${id}`);
            let currentCount = parseInt(countSpan.innerText);
            countSpan.innerText = currentCount + 1;

            // Đổi màu nút và khóa hẳn nút bấm lại
            const btn = countSpan.parentElement;
            btn.classList.add('active');
            btn.disabled = true;
        }

        // Logic Tìm kiếm
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = vtuberList.filter(v => v.name.toLowerCase().includes(keyword));
            renderCards(filtered);
        });

        // --- HỆ THỐNG SIÊU THU PHÓNG (ZOOM & PAN & WHEEL) ---
        const overlay = document.getElementById('zoomOverlay');
        const zoomImg = document.getElementById('zoomImage');

        let scale = 1;
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;

        function openZoom(imgSrc) {
            zoomImg.src = imgSrc;
            overlay.style.display = 'flex';
            // Reset các thông số zoom về ban đầu
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        overlay.addEventListener('click', (e) => {
            if (e.target !== zoomImg) {
                overlay.style.display = 'none';
            }
        });

        // Lăn chuột để Phóng to / Thu nhỏ
        zoomImg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.1;
            if (e.deltaY < 0) {
                scale += zoomSpeed; // Lăn lên -> Phóng to
            } else {
                scale = Math.max(1, scale - zoomSpeed); // Lăn xuống -> Thu nhỏ (giới hạn tối thiểu là 1)
            }
            updateTransform();
        });

        // Nhấn giữ chuột để kéo (Pan) hình ảnh khi đang zoom
        zoomImg.addEventListener('mousedown', (e) => {
            if (scale > 1) { // Chỉ cho kéo khi ảnh đã được phóng to
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                zoomImg.style.transition = 'none'; // Tắt transition để kéo mượt hơn
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function updateTransform() {
            zoomImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // Chạy hiển thị ban đầu
        renderCards(vtuberList);
    </script>
</body>
</html>
